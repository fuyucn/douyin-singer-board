# Manually-triggered build for SUSUSingBoard.
# Trigger: GitHub -> Actions -> "Release" -> Run workflow.
# Matrix: macOS arm64 + Windows x64. Unsigned.
# The artifact filename version is read from package.json automatically.

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write   # required to create releases

jobs:
  read-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          VER=$(node -p "require('./package.json').version")
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "version: $VER"

  build:
    needs: read-version
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            arch: arm64
            rust_target: aarch64-apple-darwin
          - os: windows-latest
            arch: x64
            rust_target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Install JS dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build sidecar binary
        run: pnpm sidecar:build:bin

      - name: Build Tauri app
        run: pnpm exec tauri build --target ${{ matrix.rust_target }}

      - name: Collect artifact (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.rust_target }}/release/bundle"
          OUT_DIR="release-out"
          mkdir -p "$OUT_DIR"
          cp "$BUNDLE_DIR"/dmg/*.dmg "$OUT_DIR"/ 2>/dev/null || true
          if compgen -G "$BUNDLE_DIR/macos/*.app" > /dev/null; then
            APP_PATH=$(ls -d "$BUNDLE_DIR"/macos/*.app | head -n1)
            ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" \
              "$OUT_DIR/SUSUSingBoard-macOS-${{ matrix.arch }}-${{ needs.read-version.outputs.version }}.zip"
          fi

      - name: Collect artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $target = "src-tauri/target/${{ matrix.rust_target }}/release"
          $out = "release-out"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          # Portable single .exe (sidecar is embedded, no installer needed).
          $portable = "$out/SUSUSingBoard-Windows-${{ matrix.arch }}-${{ needs.read-version.outputs.version }}.exe"
          Copy-Item "$target/sususingerboard.exe" $portable
          # Also keep MSI / NSIS installers if the bundler produced them, for users who prefer them.
          if (Test-Path "$target/bundle/msi") { Copy-Item "$target/bundle/msi/*.msi" $out -ErrorAction SilentlyContinue }
          if (Test-Path "$target/bundle/nsis") { Copy-Item "$target/bundle/nsis/*-setup.exe" $out -ErrorAction SilentlyContinue }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SUSUSingBoard-${{ runner.os }}-${{ matrix.arch }}-${{ needs.read-version.outputs.version }}
          path: release-out/*
          if-no-files-found: error
          retention-days: 30

  release:
    needs: [read-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.msi' \) -exec cp {} release/ \;
          ls -lh release/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.read-version.outputs.version }}
          name: v${{ needs.read-version.outputs.version }}
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
