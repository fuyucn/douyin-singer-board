# 手动打包 SUSUSingBoard.
# 触发: GitHub -> Actions -> "Release" -> Run workflow.
# 矩阵: macOS arm64 / macOS x64 / Windows x64. 不签名.

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Artifact 文件名版本号 (e.g. 0.1.0)'
        required: false
        default: 'dev'

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            arch: arm64
            rust_target: aarch64-apple-darwin
          - os: macos-15-intel
            arch: x64
            rust_target: x86_64-apple-darwin
          - os: windows-latest
            arch: x64
            rust_target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Install JS dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build sidecar binary
        run: pnpm sidecar:build:bin

      - name: Build Tauri app
        run: pnpm exec tauri build --target ${{ matrix.rust_target }}

      - name: Collect artifact (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.rust_target }}/release/bundle"
          OUT_DIR="release-out"
          mkdir -p "$OUT_DIR"
          cp "$BUNDLE_DIR"/dmg/*.dmg "$OUT_DIR"/ 2>/dev/null || true
          if compgen -G "$BUNDLE_DIR/macos/*.app" > /dev/null; then
            APP_PATH=$(ls -d "$BUNDLE_DIR"/macos/*.app | head -n1)
            ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" \
              "$OUT_DIR/SUSUSingBoard-macOS-${{ matrix.arch }}-${{ github.event.inputs.version }}.zip"
          fi

      - name: Collect artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/${{ matrix.rust_target }}/release/bundle"
          $out = "release-out"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          if (Test-Path "$bundle/msi") { Copy-Item "$bundle/msi/*.msi" $out -ErrorAction SilentlyContinue }
          if (Test-Path "$bundle/nsis") { Copy-Item "$bundle/nsis/*-setup.exe" $out -ErrorAction SilentlyContinue }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SUSUSingBoard-${{ runner.os }}-${{ matrix.arch }}-${{ github.event.inputs.version }}
          path: release-out/*
          if-no-files-found: error
          retention-days: 14
